<!DOCTYPE html>
<html lang="ar" dir="rtl">  
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مركز سوبر برين حمص لخدمات الدراسة و العمل عبر الانترنت</title>
  <link rel="icon" type="image/x-icon" href="favicon.png">

  <style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap');

  html, body {
    margin: 0;
    padding: 0;
    font-family: "Cairo", sans-serif;
    background-color: #ffffff;
    height: auto;
  }

  body {
    display: flex;
    justify-content: center;
    padding: 20px 0; /* مساحة من الأعلى والأسفل */
  }

  .vcard-container {
    max-width: 480px;
    width: 95%;
    border-radius: 25px;
    background: linear-gradient(180deg, #ffffff 0%, #f5fef5 100%);
    text-align: center;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15),
                0 5px 15px rgba(56, 142, 60, 0.2);
    margin-bottom: 20px;
    padding-bottom: 10px;
  }

  .vcard-container:hover {
    transform: translateY(-6px);
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.18),
                0 8px 20px rgba(56, 142, 60, 0.25);
  }

  .vcard-header, .vcard-footer {
    background: linear-gradient(90deg, #388e3c, #66bb6a);
    color: white;
    padding: 20px;
    border-radius: 25px 25px 0 0; /* أعلى يسار وأعلى يمين منحنية */
  }




  .vcard-footer { border-radius: 0 0 25px 25px; }

  .vcard-logo {
    width: 90px;
    border-radius: 50%;
    border: 4px solid white;
    margin-top: 10px;
    transition: transform 0.4s ease;
  }

  .vcard-logo:hover { transform: rotate(10deg) scale(1.15); }

  .subtitle {
    font-size: 15px;
    color: #e0f2e0;
    margin-top: 5px;
  }

  details { padding: 0 20px; }

  summary {
    cursor: pointer;
    list-style: none;
    margin: 15px 0;
    padding: 10px 20px;
    border-radius: 15px;
    background: linear-gradient(90deg, #388e3c, #66bb6a);
    color: white;
    font-weight: bold;
    text-align: center;
  }

  .vcard-buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
    padding: 15px 0;
  }

  .btn {
    text-decoration: none;
    padding: 12px;
    border-radius: 15px;
    font-weight: bold;
    text-align: center;
    width: 90%;
    color: white;
  }

  .btn-whatsapp { background-color: #25D366; }
  .btn-email { background-color: #81c784; }
  .btn-facebook { background-color: #388e3c; }
  .btn-vcard { background: linear-gradient(90deg,#4caf50,#66bb6a); }

  .vcard-qr {
    text-align: center;
    margin: 20px 0;
  }

  .vcard-qr img {
    width: 180px;
    border-radius: 15px;
    border: 3px solid #c8e6c9;
  }

  .vcard-footer a {
    color: #fff;
    font-weight: bold;
    text-decoration: none;
  }

  .vcard-footer a:hover { text-decoration: underline; }
  </style>
</head>

<body>

<div class="vcard-container">
  <div class="vcard-header">
    <img src="https://i.ibb.co/RkMZCHSH/image.png" class="vcard-logo">
    <h2>مركز سوبر برين </h2>
   <p class="subtitle">خدمات الدراسة و العمل عبر الانترنت</p>
  </div>

  <details>
    <summary>عرض كامل التفاصيل</summary>
    <div class="vcard-buttons">
      <a href="https://wa.me/963994280934" class="btn btn-whatsapp">💬 واتساب  </a>
      <a href="mailto:mycenter123456@gmail.com" class="btn btn-email">✉️ البريد الإلكتروني</a>
      <a href="https://facebook.com/sharifalmohsen" class="btn btn-facebook">🌐 فيسبوك</a>
      <a href="contact.vcf" class="btn btn-vcard">📇 احفظ جهة الاتصال (vCard)</a>
    </div>
  </details>

  <div class="vcard-qr">
    <p>📱 امسح الكود لفتح بطاقتي الرقمية مباشرة</p>
    <img src="https://i.ibb.co/jkSS23vh/qr-code-2.png">
  </div>

  <div class="vcard-footer">
    <div>تصميم مركز سوبر برين — حمص</div>
    <a href="https://www.facebook.com/sharifalmohsen">صفحتنا على فيسبوك</a>
    <div style="font-size:13px;">📞 00963994280934</div>
  </div>
</div>

</body>
</html>
